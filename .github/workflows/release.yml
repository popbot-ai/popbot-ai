name: Release

# One-button release, run from the Actions UI. Distributes via Cloudflare
# R2 (download.popbot.app) — NOT GitHub releases.
#
#   channel = prerelease → uploads a signed build to  …/beta/   (for testing)
#   channel = release    → uploads a signed build to  …/stable/ (live)
#
# Each channel is its own R2 folder with its own update manifest, so a
# prerelease can never leak into the stable auto-update feed. The app's
# auto-updater reads …/<channel>/latest*.yml; the website links to the
# installers in …/stable/.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump (from the latest stable release)
        type: choice
        options: [patch, minor, major]
        default: patch
      channel:
        description: Channel
        type: choice
        options: [prerelease, release]
        default: prerelease

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  # R2 (S3-compatible) target. Credentials come from repo secrets.
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: auto
  R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
  R2_BUCKET: popbot

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      dir: ${{ steps.v.outputs.dir }}
      feed: ${{ steps.v.outputs.feed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: v
        run: |
          # Base off the latest stable tag (final tags have no '-').
          LAST=$(git tag -l 'v*' | grep -vE '-' | sed 's/^v//' | sort -V | tail -1)
          BASE="${LAST:-$(node -p "require('./package.json').version")}"
          IFS='.' read -r MA MI PA <<< "$BASE"
          case "${{ inputs.bump }}" in
            patch) PA=$((PA+1)) ;;
            minor) MI=$((MI+1)); PA=0 ;;
            major) MA=$((MA+1)); MI=0; PA=0 ;;
          esac
          NEW="${MA}.${MI}.${PA}"
          if [ "${{ inputs.channel }}" = "release" ]; then DIR=stable; else NEW="${NEW}-rc.${{ github.run_number }}"; DIR=beta; fi
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR"     >> "$GITHUB_OUTPUT"
          echo "feed=https://download.popbot.app/$DIR" >> "$GITHUB_OUTPUT"
          echo "→ v$NEW to $DIR/"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-2022, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: npm ci
      - name: Set release version (not committed)
        shell: bash
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version --allow-same-version
      - name: Type-check
        run: npm run typecheck
      - name: Build renderer + main
        run: npm run build

      # FEED bakes the channel's R2 URL into app-update.yml so the app
      # auto-updates from the right folder.
      - name: Package + sign (macOS)
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          FEED: ${{ needs.version.outputs.feed }}
        run: |
          if [ -n "$CSC_LINK" ] && [ -n "$CSC_KEY_PASSWORD" ] && [ -n "$APPLE_ID" ] \
             && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "Signing + notarizing"
            npx electron-builder --mac --publish never --config electron-builder.yml -c.publish.url="$FEED"
          else
            echo "::warning::macOS signing secrets incomplete — building UNSIGNED"
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npx electron-builder --mac --publish never -c.mac.notarize=false --config electron-builder.yml -c.publish.url="$FEED"
          fi

      - name: Package + sign (Windows)
        if: matrix.os == 'windows-2022'
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          FEED: ${{ needs.version.outputs.feed }}
        shell: bash
        run: |
          [ -n "$CSC_LINK" ] || { echo "::warning::no Windows cert — building UNSIGNED"; unset CSC_LINK CSC_KEY_PASSWORD; }
          npx electron-builder --win --publish never --config electron-builder.yml -c.publish.url="$FEED"

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          FEED: ${{ needs.version.outputs.feed }}
        run: npx electron-builder --linux --publish never --config electron-builder.yml -c.publish.url="$FEED"

      # Upload to BOTH the per-version folder (stable URLs to download from)
      # and the channel root (the version-independent auto-update feed —
      # latest*.yml lives here and is overwritten each release).
      - name: Upload to R2 + print download links
        shell: bash
        env:
          DIR: ${{ needs.version.outputs.dir }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          inc=(--exclude "*" --include "*.dmg" --include "*.exe" --include "*.AppImage"
               --include "*.zip" --include "*.blockmap" --include "latest*.yml")
          aws s3 cp release/ "s3://$R2_BUCKET/$DIR/$VERSION/" --recursive \
            --endpoint-url "$R2_ENDPOINT" --checksum-algorithm CRC32 "${inc[@]}"
          aws s3 cp release/ "s3://$R2_BUCKET/$DIR/" --recursive \
            --endpoint-url "$R2_ENDPOINT" --checksum-algorithm CRC32 "${inc[@]}"
          # Surface the installer download link for this OS in the run summary.
          base="https://download.popbot.app/$DIR/$VERSION"
          for f in release/*.dmg release/*.exe release/*.AppImage; do
            [ -e "$f" ] || continue
            n=$(basename "$f")
            echo "- **$RUNNER_OS**: [\`$n\`]($base/$n)" >> "$GITHUB_STEP_SUMMARY"
          done

  finalize:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Record the build as a git tag so the next version computes correctly.
      # (Tags aren't branch-protected; no commit to main.)
      - name: Tag v${{ needs.version.outputs.version }}
        run: |
          git tag "v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"
      # Stable only: publish the version pointer the in-app notifier reads.
      - name: Update stable version pointer
        if: ${{ inputs.channel == 'release' }}
        run: |
          printf '{"version":"%s"}' "${{ needs.version.outputs.version }}" > version.json
          aws s3 cp version.json "s3://$R2_BUCKET/stable/version.json" --endpoint-url "$R2_ENDPOINT" --checksum-algorithm CRC32
