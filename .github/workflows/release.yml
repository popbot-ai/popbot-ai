name: Release

# One-button release, run from the Actions UI. Distributes via Cloudflare
# R2 (download.popbot.app) — NOT GitHub releases.
#
#   channel = prerelease → uploads a signed build to  …/beta/   (for testing)
#   channel = release    → uploads a signed build to  …/stable/ (live)
#
# Each channel is its own R2 folder with its own update manifest, so a
# prerelease can never leak into the stable auto-update feed. The app's
# auto-updater reads …/<channel>/latest*.yml; the website links to the
# installers in …/<channel>/<version>/.
#
# Atomicity: matrix jobs upload only to …/<channel>/<version>/. The channel
# root (the live auto-update feed) is promoted from there by `finalize`, and
# only after every platform built and the tag pushed — so a partial or
# untagged release can never become the advertised feed.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump (from the latest stable release)
        type: choice
        options: [patch, minor, major]
        default: patch
      channel:
        description: Channel
        type: choice
        options: [prerelease, release]
        default: prerelease

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

# Non-secret R2 config only. The write credentials (R2_ACCESS_KEY_ID /
# R2_SECRET_ACCESS_KEY) are injected per-step into the `aws s3` steps so they
# are NOT exposed to npm ci, the build, or packaging hooks.
env:
  AWS_DEFAULT_REGION: auto
  R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
  R2_BUCKET: popbot

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      dir: ${{ steps.v.outputs.dir }}
      feed: ${{ steps.v.outputs.feed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: v
        run: |
          # Base off the latest stable tag (final tags have no '-').
          LAST=$(git tag -l 'v*' | grep -vE '-' | sed 's/^v//' | sort -V | tail -1)
          BASE="${LAST:-$(node -p "require('./package.json').version")}"
          IFS='.' read -r MA MI PA <<< "$BASE"
          case "${{ inputs.bump }}" in
            patch) PA=$((PA+1)) ;;
            minor) MI=$((MI+1)); PA=0 ;;
            major) MA=$((MA+1)); MI=0; PA=0 ;;
          esac
          NEW="${MA}.${MI}.${PA}"
          if [ "${{ inputs.channel }}" = "release" ]; then DIR=stable; else NEW="${NEW}-rc.${{ github.run_number }}"; DIR=beta; fi
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR"     >> "$GITHUB_OUTPUT"
          echo "feed=https://download.popbot.app/$DIR" >> "$GITHUB_OUTPUT"
          echo "→ v$NEW to $DIR/"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-2022, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: npm ci
      - name: Set release version (not committed)
        shell: bash
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version --allow-same-version
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build renderer + main
        run: npm run build

      # FEED bakes the channel's R2 URL into app-update.yml. macOS MUST be
      # signed + notarized for a stable release (Gatekeeper rejects unsigned,
      # and the auto-updater refuses unsigned updates) — so fail rather than
      # publish an unsigned stable build. A prerelease may build unsigned.
      - name: Package + sign (macOS)
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          FEED: ${{ needs.version.outputs.feed }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          if [ -n "$CSC_LINK" ] && [ -n "$CSC_KEY_PASSWORD" ] && [ -n "$APPLE_ID" ] \
             && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "Signing + notarizing"
            npx electron-builder --mac --publish never --config electron-builder.yml -c.publish.url="$FEED"
          elif [ "$CHANNEL" = "release" ]; then
            echo "::error::macOS signing secrets incomplete — refusing to publish an unsigned stable release."
            exit 1
          else
            echo "::warning::macOS signing secrets incomplete — building UNSIGNED (prerelease only)"
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npx electron-builder --mac --publish never -c.mac.notarize=false --config electron-builder.yml -c.publish.url="$FEED"
          fi

      # Windows code signing via Azure Trusted Signing (Public Trust).
      # electron-builder's azureSignOptions signs PopBot.exe + the NSIS
      # installer; the bundled shado.exe (extraResources) is signed first with
      # signtool + the Trusted Signing dlib, since electron-builder does NOT
      # sign extraResources. Auth = a service principal with the "Artifact
      # Signing Certificate Profile Signer" role (AZURE_* secrets), consumed by
      # DefaultAzureCredential. Missing creds → a warned-but-unblocked unsigned
      # build (SmartScreen will warn); a stable release without them is loud.
      - name: Package + sign (Windows · Azure Trusted Signing)
        if: matrix.os == 'windows-2022'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          FEED: ${{ needs.version.outputs.feed }}
          CHANNEL: ${{ inputs.channel }}
        shell: pwsh
        run: |
          $signArgs = @()
          if ($env:AZURE_TENANT_ID -and $env:AZURE_CLIENT_ID -and $env:AZURE_CLIENT_SECRET) {
            Write-Host "Azure Trusted Signing enabled"
            $ts = Join-Path $env:RUNNER_TEMP 'ts'; New-Item -ItemType Directory -Force $ts | Out-Null
            Invoke-WebRequest 'https://www.nuget.org/api/v2/package/Microsoft.Trusted.Signing.Client' -OutFile "$ts\client.zip" -UseBasicParsing
            Expand-Archive "$ts\client.zip" "$ts\client" -Force
            $dlib = (Get-ChildItem "$ts\client" -Recurse -Filter Azure.CodeSigning.Dlib.dll | Where-Object { $_.FullName -match '\\x64\\' } | Select-Object -First 1).FullName
            @{ Endpoint='https://eus.codesigning.azure.net/'; CodeSigningAccountName='popbotsigning'; CertificateProfileName='popbot-public' } | ConvertTo-Json | Set-Content "$ts\metadata.json"
            $signtool = (Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter signtool.exe | Where-Object { $_.FullName -match '\\x64\\' } | Select-Object -First 1).FullName
            Write-Host "Signing bundled shado.exe"
            & $signtool sign /v /fd SHA256 /tr http://timestamp.acs.microsoft.com /td SHA256 /dlib $dlib /dmdf "$ts\metadata.json" 'native\shado\bin\win\shado.exe'
            if ($LASTEXITCODE -ne 0) { throw "shado.exe signing failed (exit $LASTEXITCODE)" }
            $signArgs = @(
              '-c.win.azureSignOptions.endpoint=https://eus.codesigning.azure.net/',
              '-c.win.azureSignOptions.codeSigningAccountName=popbotsigning',
              '-c.win.azureSignOptions.certificateProfileName=popbot-public'
            )
          } elseif ($env:CHANNEL -eq 'release') {
            Write-Host "::warning::Azure signing creds not set — publishing an UNSIGNED stable build (SmartScreen will warn)."
          } else {
            Write-Host "Building unsigned (prerelease)"
          }
          npx electron-builder --win --publish never --config electron-builder.yml "-c.publish.url=$env:FEED" @signArgs

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          FEED: ${{ needs.version.outputs.feed }}
        run: npx electron-builder --linux --publish never --config electron-builder.yml -c.publish.url="$FEED"

      # Upload ONLY to the per-version folder. The channel-root feed is
      # promoted later by `finalize`, after the whole matrix + tag succeed.
      - name: Upload to R2 + print download links
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          DIR: ${{ needs.version.outputs.dir }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          # Top-level distributables only. The trailing `--exclude "*/*"` drops
          # anything in a subdirectory (mac-arm64/, win-unpacked/, …) so the
          # broad `*.exe`/`*.zip` globs don't sweep in the unpacked app tree.
          aws s3 cp release/ "s3://$R2_BUCKET/$DIR/$VERSION/" --recursive \
            --endpoint-url "$R2_ENDPOINT" --checksum-algorithm CRC32 \
            --exclude "*" --include "*.dmg" --include "*.exe" --include "*.deb" \
            --include "*.zip" --include "*.blockmap" --include "latest*.yml" \
            --exclude "*/*"
          # Surface the installer download link for this OS in the run summary.
          base="https://download.popbot.app/$DIR/$VERSION"
          for f in release/*.dmg release/*.exe release/*.deb; do
            [ -e "$f" ] || continue
            n=$(basename "$f")
            echo "- **$RUNNER_OS**: [\`$n\`]($base/$n)" >> "$GITHUB_STEP_SUMMARY"
          done

  finalize:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Tag first — if this fails the feed is never promoted, so R2 can't
      # advertise an untagged release. (Tags aren't branch-protected.)
      - name: Tag v${{ needs.version.outputs.version }}
        run: |
          git tag "v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"
      # Promote the version folder to the channel root — this is the moment
      # the live auto-update feed (latest*.yml) flips to the new version, and
      # it only happens once every platform built and the tag landed.
      - name: Promote ${{ needs.version.outputs.dir }} feed
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          DIR: ${{ needs.version.outputs.dir }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          # R2 rejects the `x-amz-tagging-directive` header that aws-cli sends on
          # a server-side CopyObject (even with --copy-props none). So promote by
          # downloading the version folder and re-uploading it — GetObject then
          # PutObject, neither of which uses CopyObject/tagging.
          tmp="$(mktemp -d)"
          aws s3 cp "s3://$R2_BUCKET/$DIR/$VERSION/" "$tmp/" --recursive \
            --endpoint-url "$R2_ENDPOINT"
          # Installers/blockmaps first — everything EXCEPT the manifests…
          aws s3 cp "$tmp/" "s3://$R2_BUCKET/$DIR/" --recursive \
            --endpoint-url "$R2_ENDPOINT" --checksum-algorithm CRC32 \
            --exclude "latest*.yml"
          # …then the latest*.yml manifests last, so a client never sees a
          # manifest pointing at an object that isn't fully uploaded yet.
          aws s3 cp "$tmp/" "s3://$R2_BUCKET/$DIR/" --recursive \
            --endpoint-url "$R2_ENDPOINT" --checksum-algorithm CRC32 \
            --exclude "*" --include "latest*.yml"
      # Stable only: publish the version pointer the in-app notifier reads.
      - name: Update stable version pointer
        if: ${{ inputs.channel == 'release' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          printf '{"version":"%s"}' "${{ needs.version.outputs.version }}" > version.json
          aws s3 cp version.json "s3://$R2_BUCKET/stable/version.json" --endpoint-url "$R2_ENDPOINT" --checksum-algorithm CRC32
