name: Build

# Validation builds only — proves PopBot compiles and packages on macOS,
# Windows, and Linux. Always UNSIGNED; nothing is published. Releasing
# (signed + notarized, prerelease or release) is handled entirely by
# release.yml (run from the Actions UI).
#
# Native modules (better-sqlite3, node-pty) are compiled per-OS against
# Electron's ABI, so each platform builds on its own runner.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # windows-2022, not windows-latest: windows-latest migrated to
        # Server 2025 + Visual Studio 2026, which node-gyp 9.4.1 (bundled by
        # @electron/rebuild) doesn't recognize, so it can't compile node-pty.
        os: [macos-latest, windows-2022, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Python 3.11 still bundles distutils, which node-gyp needs to build node-pty.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build renderer + main
        run: npm run build

      - name: Package (macOS, unsigned)
        if: matrix.os == 'macos-latest'
        run: |
          export CSC_IDENTITY_AUTO_DISCOVERY=false
          npx electron-builder --mac --publish never -c.mac.notarize=false --config electron-builder.yml

      - name: Package (Windows, unsigned)
        if: matrix.os == 'windows-2022'
        run: npx electron-builder --win --publish never --config electron-builder.yml

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never --config electron-builder.yml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: popbot-${{ matrix.os }}
          retention-days: 14
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.exe
            release/*.deb
            release/*.zip
            release/*.blockmap
            release/latest*.yml
