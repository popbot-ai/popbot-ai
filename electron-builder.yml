appId: com.proofofplay.popbot
productName: PopBot
copyright: Copyright © 2026 Proof of Play, Inc.
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
  - "!**/{.DS_Store,Thumbs.db,*.log}"
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  # "mac" in the filename for both the .dmg and the updater .zip.
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  # Code signing + notarization. electron-builder picks the certificate
  # by name match against the user's keychain. To sign + notarize your
  # own build, set CSC_NAME to your "Developer ID Application" subject
  # name (or leave it unset to let electron-builder auto-discover a
  # Developer ID in your keychain), and provide APPLE_ID +
  # APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID at build time (see
  # scripts/release.sh). With no signing identity available, the build
  # is unsigned/ad-hoc and macOS Gatekeeper will warn on launch.
  # identity: "Your Name (TEAMID)"   # or set via CSC_NAME env var
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # notarize: true — team id, apple id, and password come from env vars
  # (APPLE_TEAM_ID, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD). Passing
  # teamId here is rejected by the current electron-builder.
  notarize: true
  # popbot-windowmover native helper not yet built — re-add the
  # extraResources block when the binary lands under
  # `native/popbot-windowmover/build/`.
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-win-${arch}.${ext}
  # Bundle the shado shadow-workspace controller (built by scripts/build-shado.mjs
  # into native/shado/). Lands at resources/shado/shado.exe in the installed app;
  # src/main/shado/client.ts resolves it via process.resourcesPath.
  extraResources:
    - from: native/shado/bin/win/shado.exe
      to: shado/shado.exe
  # No code-signing wired up for Windows yet — builds are unsigned, so
  # SmartScreen will warn on first launch. Set CSC_LINK / CSC_KEY_PASSWORD
  # (a .pfx) at build time to sign.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  # .deb only. dpkg installs to /opt as root, so chrome-sandbox ends up
  # root:4755 and Chromium's SUID sandbox works with no flags — unlike
  # AppImage, which on Ubuntu 24.04+ needs libfuse2 AND a sandbox
  # workaround (--no-sandbox or re-enabling unprivileged user namespaces)
  # because its extracted chrome-sandbox can't be setuid root.
  #
  # NOTE: electron-updater can only auto-update AppImage on Linux, not a
  # .deb — so Linux updates are manual (download the new .deb) for now.
  # Re-add `AppImage` to `target` to restore the in-app auto-update feed.
  target:
    - deb
  category: Development
  synopsis: Multi-chat, multi-slot agentic coding tool
  maintainer: Proof of Play, Inc. <noreply@proofofplay.com>
  # Hardcode amd64 (the matrix only builds x64) so the filename is
  # deterministic and matches the site's computed download link.
  artifactName: ${productName}-${version}-linux-amd64.${ext}
  # electron-builder derives the Linux icon set from build/icon.png
  # (1024x1024) automatically — no platform-specific icon needed.
deb:
  # Modern Ubuntu (24.04/26) runtime deps. The t64 names are the 64-bit
  # time_t packages; the "| old-name" alternatives keep it installable on
  # 22.04. electron-builder's default depends list references packages
  # that no longer exist on current Ubuntu (gconf2, libappindicator1), so
  # we set an explicit modern list.
  depends:
    - libgtk-3-0t64 | libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libatspi2.0-0t64 | libatspi2.0-0
    - libdrm2
    - libgbm1
    - libasound2t64 | libasound2
dmg:
  # Volume icon shown when the .dmg is mounted. Without this,
  # electron-builder falls back to a default flat square — looks bad
  # next to the masked .app icon inside. Pointing at the same .icns
  # we use for the app gives the volume the same rounded squircle.
  icon: build/icon.icns
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
# Generic provider on Cloudflare R2. This generates the update metadata
# (latest-mac.yml / latest.yml / latest-linux.yml + blockmaps) and bakes the
# feed URL into app-update.yml, which the in-app electron-updater
# (src/main/updates/autoUpdate.ts) reads. The release workflow overrides
# `url` per channel (…/stable or …/beta) via -c.publish.url and uploads the
# files to R2 itself (electron-builder runs with --publish never).
publish:
  provider: generic
  url: https://download.popbot.app/stable
